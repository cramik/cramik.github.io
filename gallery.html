<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cramik Gallery</title>
    <style>
      :root {
        --bg-color: #0f0f11;
        --text-color: #f4f4f5;
        --accent-color: #6366f1;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
      }

      .gallery-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }

      .gallery-item {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        aspect-ratio: 1 / 1;
        cursor: pointer;
        background-color: #18181b;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      }

      .gallery-item:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.3s ease, transform 0.5s ease;
        opacity: 0;
      }

      .gallery-item img.loaded {
        opacity: 1;
      }

      .gallery-item:hover img {
        transform: scale(1.08);
      }

      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.95);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        backdrop-filter: blur(5px);
      }

      .lightbox.active {
        opacity: 1;
        pointer-events: auto;
      }

      .lightbox img {
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 8px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        transform: scale(0.95);
        transition: transform 0.3s ease;
      }

      .lightbox.active img {
        transform: scale(1);
      }

      .lightbox-close {
        position: absolute;
        top: 2rem;
        right: 3rem;
        color: white;
        font-size: 3rem;
        cursor: pointer;
        transition: color 0.2s;
        user-select: none;
      }

      .lightbox-close:hover {
        color: var(--accent-color);
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: #a1a1aa;
        font-family: monospace;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <main class="gallery-container" id="gallery"></main>
    <div id="scroll-trigger" class="loading">Loading more...</div>
    <div class="lightbox" id="lightbox">
      <span class="lightbox-close" id="lightbox-close">&times;</span>
      <img src="" alt="Full screen preview" id="lightbox-img">
    </div>
    <script>
      const ACTIVE_LIST_FILE = 'imgbb.txt';
      let imageUrls = [];
      const gallery = document.getElementById('gallery');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxClose = document.getElementById('lightbox-close');
      const scrollTrigger = document.getElementById('scroll-trigger');
      const BATCH_SIZE = 6;
      let currentIndex = 0;

      function loadBatch() {
        const nextBatch = imageUrls.slice(currentIndex, currentIndex + BATCH_SIZE);
        if (nextBatch.length === 0) return;
        nextBatch.forEach((url, index) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'gallery-item';
          const img = document.createElement('img');
          img.src = url.trim();
          img.alt = `Image ${currentIndex + index + 1}`;
          img.loading = "lazy";
          img.onload = () => img.classList.add('loaded');
          itemDiv.addEventListener('click', () => openLightbox(url));
          itemDiv.appendChild(img);
          gallery.appendChild(itemDiv);
        });
        currentIndex += BATCH_SIZE;
        if (currentIndex >= imageUrls.length) {
          scrollTrigger.style.display = 'none';
          if (observer) observer.disconnect();
        }
      }
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          setTimeout(loadBatch, 200);
        }
      }, {
        rootMargin: '200px'
      });
      fetch(ACTIVE_LIST_FILE).then(response => {
        if (!response.ok) throw new Error("File not found");
        return response.text();
      }).then(text => {
        imageUrls = text.split('\n').map(line => line.trim()).filter(line => line !== '');
        if (imageUrls.length > 0) {
          observer.observe(scrollTrigger);
          loadBatch();
        } else {
          scrollTrigger.innerText = "No images found in " + ACTIVE_LIST_FILE;
        }
      }).catch(error => {
        console.error('Error fetching list:', error);
        scrollTrigger.innerText = "Error loading " + ACTIVE_LIST_FILE;
      });

      function openLightbox(url) {
        lightboxImg.src = url;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        setTimeout(() => {
          lightboxImg.src = "";
        }, 300);
        document.body.style.overflow = '';
      }
      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
          closeLightbox();
        }
      });
      loadBatch();
    </script>
  </body>
</html>
